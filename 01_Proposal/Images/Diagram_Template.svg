<?xml version="1.0" encoding="UTF-8"?>
<svg width="1600" height="900" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Padis Syncolony editable diagram template">
  <title>Padis / Syncolony Diagram Template</title>
  <desc>Native editable SVG template for proposal diagrams. All labels are real SVG text and editable in Inkscape.</desc>

  <defs>
    <style>
      .font { font-family: "Segoe UI", Arial, Helvetica, sans-serif; }
      .title { font-size: 34px; font-weight: 700; fill: #005BAC; }
      .subtitle { font-size: 18px; font-weight: 400; fill: #4A4A4A; }
      .section-label { font-size: 18px; font-weight: 700; fill: #005BAC; }
      .box-title { font-size: 20px; font-weight: 700; fill: #FFFFFF; }
      .box-label { font-size: 18px; font-weight: 600; fill: #4A4A4A; }
      .small-label { font-size: 15px; font-weight: 500; fill: #4A4A4A; }
      .primary-box { fill: #005BAC; stroke: #005BAC; stroke-width: 2; }
      .secondary-box { fill: #FFFFFF; stroke: #4A90E2; stroke-width: 2; }
      .light-box { fill: #FFFFFF; stroke: #D9D9D9; stroke-width: 2; }
      .module-box { fill: #F8FBFF; stroke: #4A90E2; stroke-width: 2; }
      .connector { stroke: #4A4A4A; stroke-width: 2.5; fill: none; }
      .data-connector { stroke: #4A90E2; stroke-width: 2.5; fill: none; }
      .alarm-connector { stroke: #D32F2F; stroke-width: 2.5; fill: none; }
      .optional-connector { stroke: #4A4A4A; stroke-width: 2.5; stroke-dasharray: 8 6; fill: none; }
      .guide { stroke: #EDEDED; stroke-width: 1; fill: none; }
      .canvas-border { fill: #FFFFFF; stroke: #D9D9D9; stroke-width: 1; }
    </style>

    <marker id="arrow-gray" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#4A4A4A"/>
    </marker>
    <marker id="arrow-blue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#4A90E2"/>
    </marker>
    <marker id="arrow-red" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#D32F2F"/>
    </marker>
  </defs>

  <!-- White canvas -->
  <rect x="0" y="0" width="1600" height="900" class="canvas-border"/>

  <!-- Optional light alignment grid. Delete or hide before final export if not needed. -->
  <g id="alignment-grid" opacity="0.35">
    <path d="M100 0 V900 M200 0 V900 M300 0 V900 M400 0 V900 M500 0 V900 M600 0 V900 M700 0 V900 M800 0 V900 M900 0 V900 M1000 0 V900 M1100 0 V900 M1200 0 V900 M1300 0 V900 M1400 0 V900 M1500 0 V900" class="guide"/>
    <path d="M0 100 H1600 M0 200 H1600 M0 300 H1600 M0 400 H1600 M0 500 H1600 M0 600 H1600 M0 700 H1600 M0 800 H1600" class="guide"/>
  </g>

  <!-- Header placeholders -->
  <text id="diagram-title" x="80" y="75" class="font title">Diagram Title</text>
  <text id="diagram-subtitle" x="80" y="108" class="font subtitle">Short subtitle or scope label</text>
  <text id="figure-number" x="1370" y="75" text-anchor="end" class="font section-label">Figure 04-00-00</text>

  <!-- Example architecture skeleton -->
  <g id="diagram-placeholders">
    <!-- Top actors row -->
    <text x="800" y="160" text-anchor="middle" class="font section-label">Users / Actors</text>

    <rect x="180" y="190" rx="18" ry="18" width="210" height="70" class="light-box"/>
    <text x="285" y="233" text-anchor="middle" class="font box-label">User Group</text>

    <rect x="470" y="190" rx="18" ry="18" width="210" height="70" class="light-box"/>
    <text x="575" y="233" text-anchor="middle" class="font box-label">Operator</text>

    <rect x="760" y="190" rx="18" ry="18" width="210" height="70" class="light-box"/>
    <text x="865" y="233" text-anchor="middle" class="font box-label">Administrator</text>

    <rect x="1050" y="190" rx="18" ry="18" width="210" height="70" class="light-box"/>
    <text x="1155" y="233" text-anchor="middle" class="font box-label">External User</text>

    <!-- Access layer -->
    <path d="M800 270 V320" class="connector" marker-end="url(#arrow-gray)"/>
    <rect x="560" y="330" rx="22" ry="22" width="480" height="82" class="secondary-box"/>
    <text x="800" y="380" text-anchor="middle" class="font box-label">Web Portal / Application Layer</text>

    <!-- Core platform -->
    <path d="M800 420 V465" class="data-connector" marker-end="url(#arrow-blue)"/>
    <rect x="470" y="475" rx="26" ry="26" width="660" height="90" class="primary-box"/>
    <text x="800" y="530" text-anchor="middle" class="font box-title">Padis / Syncolony Integrated Platform</text>

    <!-- Module row -->
    <path d="M800 575 V615" class="data-connector" marker-end="url(#arrow-blue)"/>
    <text x="800" y="640" text-anchor="middle" class="font section-label">Modules</text>

    <rect x="150" y="665" rx="16" ry="16" width="190" height="60" class="module-box"/>
    <text x="245" y="702" text-anchor="middle" class="font small-label">Module 01</text>

    <rect x="370" y="665" rx="16" ry="16" width="190" height="60" class="module-box"/>
    <text x="465" y="702" text-anchor="middle" class="font small-label">Module 02</text>

    <rect x="590" y="665" rx="16" ry="16" width="190" height="60" class="module-box"/>
    <text x="685" y="702" text-anchor="middle" class="font small-label">Module 03</text>

    <rect x="810" y="665" rx="16" ry="16" width="190" height="60" class="module-box"/>
    <text x="905" y="702" text-anchor="middle" class="font small-label">Module 04</text>

    <rect x="1030" y="665" rx="16" ry="16" width="190" height="60" class="module-box"/>
    <text x="1125" y="702" text-anchor="middle" class="font small-label">Module 05</text>

    <rect x="1250" y="665" rx="16" ry="16" width="190" height="60" class="module-box"/>
    <text x="1345" y="702" text-anchor="middle" class="font small-label">Module 06</text>

    <!-- Bottom layer -->
    <path d="M800 735 V775" class="connector" marker-end="url(#arrow-gray)"/>
    <rect x="250" y="790" rx="18" ry="18" width="280" height="58" class="light-box"/>
    <text x="390" y="826" text-anchor="middle" class="font small-label">Database</text>

    <rect x="660" y="790" rx="18" ry="18" width="280" height="58" class="light-box"/>
    <text x="800" y="826" text-anchor="middle" class="font small-label">Field Devices</text>

    <rect x="1070" y="790" rx="18" ry="18" width="280" height="58" class="light-box"/>
    <text x="1210" y="826" text-anchor="middle" class="font small-label">External Systems</text>
  </g>

  <!-- Template notes as editable hidden metadata. Keep hidden for normal use. -->
  <g id="template-notes" display="none">
    <text x="80" y="870" class="font small-label">Native SVG. Do not embed raster images. Text must remain editable in Inkscape. PNG must be exported from this SVG.</text>
  </g>
</svg>
